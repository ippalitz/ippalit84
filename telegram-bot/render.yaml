services:
  - type: web
    name: ippalit-zapchasty-bot
    env: docker
    plan: free
    rootDir: telegram-bot
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: MANAGER_CHAT_ID
        sync: false
      - key: ADEO_LOGIN
        sync: false
      - key: ADEO_PASSWORD
        sync: false
      - key: ADEO_URL_PRICES
        value: https://xml.adeo.pro/pricedetails2.php
      - key: MARKUP_PERCENT
        value: "30"
      - key: MAX_OFFERS_PER_QUERY
        value: "5"
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: GOOGLE_SHEETS_ENABLED
        value: "0"
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
